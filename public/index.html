<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect | MiniCRM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body class="dashboard-body d-flex align-items-center justify-content-center min-vh-100">

<div class="container d-flex align-items-center justify-content-center">
  <div class="card glass p-4 p-md-5 shadow-lg w-100" style="max-width:480px;">
    
    <header class="text-center mb-4">
      <h2 class="fw-bold text-white">📩 Get In Touch</h2>
      <p class="text-muted">We’ll respond quickly to your enquiry</p>
    </header>

    <form id="leadForm" novalidate>
      <div class="mb-3">
        <label for="name" class="form-label small fw-semibold">Full Name</label>
        <input type="text" class="form-control custom-input" id="name" placeholder="John Doe" required>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label small fw-semibold">Email Address</label>
        <input type="email" class="form-control custom-input" id="email" placeholder="name@company.com" required>
      </div>

      <div class="mb-3">
        <label for="source" class="form-label small fw-semibold">How did you find us?</label>
        <select class="form-select custom-input" id="source">
          <option value="Google">Google Search</option>
          <option value="Social Media">Social Media</option>
          <option value="Referral">Referral / Friend</option>
          <option value="Other" selected>Other</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="message" class="form-label small fw-semibold">Your Message</label>
        <textarea class="form-control custom-input" id="message" rows="4" placeholder="How can we help?" required></textarea>
      </div>

      <button type="submit" id="submitBtn" class="btn btn-gradient w-100 mt-2">
        <span id="btnText">Send Message</span>
        <span id="btnLoader" class="spinner-border spinner-border-sm d-none" role="status"></span>
      </button>
    </form>

    <div id="msg" class="mt-3 text-center small"></div>
  </div>
</div>

<script>
document.getElementById("leadForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  const msgDiv = document.getElementById("msg");
  const btnText = document.getElementById("btnText");
  const btnLoader = document.getElementById("btnLoader");
  const submitBtn = document.getElementById("submitBtn");

  if (!this.checkValidity()) {
    msgDiv.className = "mt-3 text-center text-danger fw-bold";
    msgDiv.innerText = "⚠️ Please fill in all fields correctly.";
    return;
  }

  submitBtn.disabled = true;
  btnText.innerText = "Sending...";
  btnLoader.classList.remove("d-none");
  msgDiv.innerText = "";

  // UPDATED: Added source to the lead object
  const lead = {
    name: document.getElementById("name").value.trim(),
    email: document.getElementById("email").value.trim(),
    message: document.getElementById("message").value.trim(),
    source: document.getElementById("source").value // Now pulling from dropdown
  };

  try {
    const res = await fetch("/api/leads", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(lead)
    });

    if (res.ok) {
      msgDiv.className = "mt-3 text-center text-success fw-bold";
      msgDiv.innerText = "✅ Message sent successfully!";
      this.reset();
    } else {
      throw new Error("Server error");
    }
  } catch (error) {
    msgDiv.className = "mt-3 text-center text-danger fw-bold";
    msgDiv.innerText = "❌ Connection failed.";
  } finally {
    submitBtn.disabled = false;
    btnText.innerText = "Send Message";
    btnLoader.classList.add("d-none");
  }
});
</script>

</body>
</html>
